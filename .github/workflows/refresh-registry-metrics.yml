name: Refresh registry metrics

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'
  push:
    paths:
      - .github/workflows/refresh-registry-metrics.yml
permissions:
  contents: write

concurrency:
  group: refresh-registry-metrics
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Recount crates.io and npm
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
          const fmt = n => new Intl.NumberFormat('en-US').format(n);
          const iso = d => d.toISOString().slice(0, 10);

          async function fetchJson(url, options = {}, attempts = 12) {
            let last;
            for (let i = 0; i < attempts; i++) {
              try {
                const response = await fetch(url, {
                  ...options,
                  headers: {
                    'Accept': 'application/json',
                    'User-Agent': 'ruvnet-profile-registry-audit/1.0 (+https://github.com/ruvnet/ruvnet)',
                    ...(options.headers || {})
                  }
                });
                if (response.ok) return await response.json();
                last = new Error(`${response.status} ${response.statusText}: ${url}`);
                if (response.status !== 429 && response.status < 500) throw last;
                if (response.status === 429) {
                  const retryAfter = Number(response.headers.get('retry-after') || 10);
                  await sleep(Math.max(10, retryAfter) * 1000);
                  continue;
                }
              } catch (error) {
                last = error;
              }
              await sleep(1500 * (i + 1));
            }
            throw last;
          }

          async function npmInventory() {
            const packages = new Set();
            let from = 0;
            let total = Infinity;
            while (from < total) {
              const url = `https://registry.npmjs.org/-/v1/search?text=maintainer%3Aruvnet&size=250&from=${from}`;
              const body = await fetchJson(url);
              total = body.total || 0;
              for (const item of body.objects || []) {
                const pkg = item.package;
                const maintainers = pkg.maintainers || [];
                if (maintainers.some(m => (m.username || m.name) === 'ruvnet')) packages.add(pkg.name);
              }
              if (!(body.objects || []).length) break;
              from += body.objects.length;
            }
            return [...packages].sort();
          }

          async function npmDownloads(packages, start, end) {
            const rows = [];
            const missing = [];
            const unscoped = packages.filter(name => !name.startsWith('@'));
            const scoped = packages.filter(name => name.startsWith('@'));

            for (let i = 0; i < unscoped.length; i += 40) {
              const batch = unscoped.slice(i, i + 40);
              const names = batch.map(encodeURIComponent).join(',');
              const url = `https://api.npmjs.org/downloads/point/${start}:${end}/${names}`;
              const body = await fetchJson(url);
              if (batch.length === 1 && typeof body.downloads === 'number') {
                rows.push({name: batch[0], downloads: body.downloads});
              } else {
                for (const name of batch) {
                  const value = body[name]?.downloads;
                  if (typeof value === 'number') rows.push({name, downloads: value});
                  else missing.push(name);
                }
              }
              await sleep(500);
            }

            let cursor = 0;
            async function scopedWorker() {
              while (cursor < scoped.length) {
                const name = scoped[cursor++];
                const url = `https://api.npmjs.org/downloads/point/${start}:${end}/${encodeURIComponent(name)}`;
                const body = await fetchJson(url);
                if (typeof body.downloads === 'number') rows.push({name, downloads: body.downloads});
                else missing.push(name);
                await sleep(600);
              }
            }
            await Promise.all([scopedWorker(), scopedWorker()]);
            return {
              downloads: rows.reduce((sum, row) => sum + row.downloads, 0),
              missing,
              top_20: rows.sort((a, b) => b.downloads - a.downloads).slice(0, 20)
            };
          }

          async function npmMonthlyDownloads(packages, start, end) {
            const totals = new Map();
            const missing = [];
            let cursor = 0;

            async function worker() {
              while (cursor < packages.length) {
                const name = packages[cursor++];
                const url = `https://api.npmjs.org/downloads/range/${start}:${end}/${encodeURIComponent(name)}`;
                const body = await fetchJson(url);
                if (!Array.isArray(body.downloads)) {
                  missing.push(name);
                } else {
                  for (const point of body.downloads) {
                    const month = point.day.slice(0, 7);
                    totals.set(month, (totals.get(month) || 0) + Number(point.downloads || 0));
                  }
                }
                await sleep(700);
              }
            }

            await Promise.all([worker(), worker()]);
            const rows = [];
            const cursorDate = new Date(`${start}T00:00:00Z`);
            const endDate = new Date(`${end}T00:00:00Z`);
            while (cursorDate <= endDate) {
              const month = cursorDate.toISOString().slice(0, 7);
              rows.push({month, downloads: totals.get(month) || 0});
              cursorDate.setUTCMonth(cursorDate.getUTCMonth() + 1);
            }
            return {rows, missing};
          }

          async function crateInventory() {
            const crates = [];
            let page = 1;
            while (true) {
              const url = `https://crates.io/api/v1/crates?page=${page}&per_page=100&user_id=339999`;
              const body = await fetchJson(url);
              const rows = body.crates || [];
              crates.push(...rows);
              if (rows.length < 100) break;
              page++;
              await sleep(1100);
            }
            return crates;
          }

          (async () => {
            const now = new Date();
            const endDate = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - 1));
            const startDate = new Date(endDate);
            startDate.setUTCDate(startDate.getUTCDate() - 364);
            const start = iso(startDate);
            const end = iso(endDate);
            const chartEndDate = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), 0));
            const chartStartDate = new Date(Date.UTC(chartEndDate.getUTCFullYear(), chartEndDate.getUTCMonth() - 11, 1));
            const chartStart = iso(chartStartDate);
            const chartEnd = iso(chartEndDate);

            const npmPackages = await npmInventory();
            const npm = await npmDownloads(npmPackages, start, end);
            const monthly = await npmMonthlyDownloads(npmPackages, chartStart, chartEnd);
            const crates = await crateInventory();
            const crateDownloads = crates.reduce((sum, crate) => sum + Number(crate.downloads || 0), 0);

            if (npm.missing.length) throw new Error(`Missing npm download rows: ${npm.missing.join(', ')}`);
            if (monthly.missing.length) throw new Error(`Missing npm monthly rows: ${monthly.missing.join(', ')}`);
            if (npmPackages.length < 300) throw new Error(`Unexpectedly low npm package count: ${npmPackages.length}`);
            if (crates.length < 300) throw new Error(`Unexpectedly low crate count: ${crates.length}`);

            const result = {
              schema_version: '1.0',
              generated_at: new Date().toISOString(),
              npm: {
                maintainer: 'ruvnet',
                package_count: npmPackages.length,
                downloads: npm.downloads,
                period_start: start,
                period_end: end,
                period_days: 365,
                monthly_period_start: chartStart,
                monthly_period_end: chartEnd,
                monthly_downloads: monthly.rows,
                counting_rule: 'Sum of npm point-download counts for every public package whose metadata lists ruvnet as a maintainer, including scoped and platform packages.'
              },
              crates_io: {
                user_id: 339999,
                crate_count: crates.length,
                cumulative_downloads: crateDownloads,
                counting_rule: 'Sum of the downloads field for every crate returned by the crates.io owner API for user_id 339999.'
              }
            };

            fs.mkdirSync('data', {recursive: true});
            fs.writeFileSync('data/registry-stats.json', JSON.stringify(result, null, 2) + '\n');

            const metricsPath = 'data/metrics.json';
            const metrics = JSON.parse(fs.readFileSync(metricsPath, 'utf8'));
            metrics.verified_at = result.generated_at;
            metrics.counts.rust_crates = crates.length;
            metrics.counts.npm_packages = npmPackages.length;
            metrics.counts.rust_crate_downloads_cumulative = crateDownloads;
            metrics.current_windows = {
              npm_downloads_rolling_365_days: npm.downloads,
              npm_period_start: start,
              npm_period_end: end
            };
            fs.writeFileSync(metricsPath, JSON.stringify(metrics, null, 2) + '\n');

            const readmePath = 'README.md';
            let readme = fs.readFileSync(readmePath, 'utf8');
            readme = readme.replace(
              /\| Cumulative Rust crate downloads(?: \(verified [^)]+\))? \| [^\n]+/,
              `| Cumulative Rust crate downloads (verified ${iso(now)}) | ${fmt(crateDownloads)} |`
            );
            readme = readme.replace(
              /\| npm downloads, rolling 365 days \([^)]+\) \| [^\n]+/,
              `| npm downloads, rolling 365 days (${start}–${end}) | ${fmt(npm.downloads)} |`
            );

            const chartLabels = monthly.rows.map(row => {
              const [year, month] = row.month.split('-').map(Number);
              return `"${new Date(Date.UTC(year, month - 1, 1)).toLocaleString('en-US', {month: 'short', year: 'numeric', timeZone: 'UTC'})}"`;
            }).join(', ');
            const chartValues = monthly.rows.map(row => Number((row.downloads / 1_000_000).toFixed(3)));
            const chartMax = Math.max(1, Math.ceil(Math.max(...chartValues)));
            const chart = [
              '<!-- registry-download-chart:start -->',
              '## npm download growth',
              '',
              `Monthly downloads across all ${npmPackages.length} npm packages maintained by ruvnet. The chart uses the latest 12 complete UTC calendar months; figures are millions of package downloads.`,
              '',
              '```mermaid',
              'xychart-beta',
              '    title "rUv npm ecosystem: monthly downloads"',
              `    x-axis [${chartLabels}]`,
              `    y-axis "Downloads (millions)" 0 --> ${chartMax}`,
              `    line [${chartValues.join(', ')}]`,
              '```',
              '',
              `**Period:** ${chartStart} through ${chartEnd} · **Source:** official npm daily range API · Scoped, unscoped, and target-specific platform packages included. Download events are not unique users.`,
              '<!-- registry-download-chart:end -->'
            ].join('\n');
            const chartPattern = /<!-- registry-download-chart:start -->[\s\S]*?<!-- registry-download-chart:end -->/;
            if (chartPattern.test(readme)) readme = readme.replace(chartPattern, chart);
            else readme = readme.replace('\n## Start here', `\n${chart}\n\n## Start here`);
            readme = readme.replaceAll('1,035,139 cumulative crate downloads', `${fmt(crateDownloads)} cumulative crate downloads`);
            readme = readme.replaceAll('1,035,139 crate downloads', `${fmt(crateDownloads)} crate downloads`);
            fs.writeFileSync(readmePath, readme);

            const packageDoc = 'docs/ruvnet-packages.md';
            let doc = fs.readFileSync(packageDoc, 'utf8');
            doc = doc.replace(
              /\*\*\d+\*\* Rust crates \([\d,]+ cumulative downloads\)/,
              `**${crates.length}** Rust crates (${fmt(crateDownloads)} cumulative downloads)`
            );
            doc = doc.replace(
              /The exact npm recount is \*\*[\d,]+ downloads\*\* across \d+ maintained packages for the complete 365-day window \*\*\d{4}-\d{2}-\d{2} through \d{4}-\d{2}-\d{2}\*\*\./,
              `The exact npm recount is **${fmt(npm.downloads)} downloads** across ${npmPackages.length} maintained packages for the complete 365-day window **${start} through ${end}**.`
            );
            doc = doc.replace(
              /crates\.io reports \*\*[\d,]+ cumulative downloads\*\* across \d+ crates\./,
              `crates.io reports **${fmt(crateDownloads)} cumulative downloads** across ${crates.length} crates.`
            );
            doc = doc.replace(
              /^\| \[crates\.io\]\([^\n]+$/m,
              `| [crates.io](https://crates.io/users/ruvnet) | **${crates.length}** | ${fmt(crateDownloads)} cumulative |`
            );
            doc = doc.replace(
              /^\| \[npm\]\([^\n]+$/m,
              `| [npm](https://www.npmjs.com/~ruvnet) | **${npmPackages.length}** | **${fmt(npm.downloads)}** during ${start}–${end} |`
            );
            fs.writeFileSync(packageDoc, doc);

            console.log(JSON.stringify(result, null, 2));
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - name: Commit refreshed metrics
        shell: bash
        run: |
          if git diff --quiet && [ -f data/registry-stats.json ]; then
            echo "No metric changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/ruvnet-packages.md data/metrics.json data/registry-stats.json
          git commit -m "refresh npm and crates.io download metrics"
          git push
